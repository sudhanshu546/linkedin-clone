server:
  port: 8081

apiPrefix: /js

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
    hostname: ${REGISTRATION_IP:localhost}

spring:
  application:
    name: job-service
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${JDBC_DATABASE_URL:jdbc:${DB_URI:postgresql://localhost:5432/job_service_db}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithm: RS256
          issuer-uri: ${KEYCLOAK_URL:http://keycloak-placeholder}/realms/linkedin
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_RETRY_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG}

openapi:
  service:
    title: job-service doc
    version: 1.0.0
    url: ${OPENAPI_URL:http://localhost:9191/js}
