services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linkedin-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - linkedin-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - linkedin-network

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - linkedin-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5
      start_period: 30s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9191:9191"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      # Use host.docker.internal to reach your local Keycloak
      KEYCLOAK_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - linkedin-network

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8090:8090"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      DB_URI: jdbc:postgresql://postgres:5432/user_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://host.docker.internal:8080
      # You may need to override these if your local setup differs
      # KEYCLOAK_USER_CLIENT_SECRET: your-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - linkedin-network

  profile-service:
    build: ./profile-service
    container_name: profile-service
    ports:
      - "8700:8700"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      DB_URI: jdbc:postgresql://postgres:5432/profile_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - linkedin-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "9095:9095"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      DB_URI: jdbc:postgresql://postgres:5432/notification_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - linkedin-network

  job-service:
    build: ./job-service
    container_name: job-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      DB_URI: jdbc:postgresql://postgres:5432/job_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - linkedin-network

  chat-service:
    build: ./chat-service
    container_name: chat-service
    ports:
      - "8086:8086"
    environment:
      EUREKA_URL: http://discovery-service:8761/eureka
      DB_URI: jdbc:postgresql://postgres:5432/chat_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - linkedin-network

networks:
  linkedin-network:
    driver: bridge

volumes:
  postgres_data:
