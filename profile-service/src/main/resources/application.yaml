server:
  port: 8700

apiPrefix: /ps

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true
    hostname: ${REGISTRATION_IP:localhost}

openapi:
  service:
    title: profile-service doc
    version: 1.0.0
    url: ${OPENAPI_URL:https://localhost:8888/api}

spring:
  application:
    name: profile-service
  main:
    allow-bean-definition-overriding: true
  resources:
    add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${JDBC_DATABASE_URL:jdbc:${DB_URI:postgresql://localhost:5432/profile_service_db}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      poolName: Hikari
      maximumPoolSize: 5
      minimumIdle: 2
      idleTimeout: 300000
      autoCommit: false
      maxLifetime: 600000
  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithm: RS256
          issuer-uri: ${KEYCLOAK_URL:http://keycloak-placeholder}/realms/linkedin
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_RETRY_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: profile-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.org.linkedin.dto.event"

kafka:
  topics:
    post-created: post-created
    post-liked: post-liked
    comment-created: comment-created
    profile-viewed: profile-viewed
    connection-requested: connection-requested
    connection-accepted: connection-accepted
