logging:
  level:
    org.springframework.web: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    com.org.linkedin: DEBUG

server:
  port: ${PORT:9095}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

apiPrefix: /ns

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    preferIpAddress: false
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

spring:
  application:
    name: notification-service
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      ddl-auto: update
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URI:jdbc:postgresql://localhost:5432/notification_service_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/linkedin
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/linkedin/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

openapi:
  service:
    title: notification-service doc
    version: 1.0.0
    url: ${OPENAPI_URL:http://localhost:9191/ns}

kafka:
  topics:
    connection-requested: connection-requested
    connection-accepted: connection-accepted
    post-reacted: post-reacted
    comment-created: comment-created
    profile-viewed: profile-viewed
    job-application-status-updated: job-application-status-updated
    user-mentioned: user-mentioned
    user-deleted: user-deleted
